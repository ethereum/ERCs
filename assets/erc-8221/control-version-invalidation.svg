<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Control Version Invalidation on Transfer or Reset</title>
  <desc id="desc">Diagram showing that when the controlling NFT transfers or resetDelegations is called, controlVersion increments, and all version-scoped authority — validators, hooks, signed execution requests, and ERC-1271 signatures — is automatically invalidated. The new controller starts with a clean slate.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#304254"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #fbfaf6; }
    .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1c2733; }
    .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #52606d; }
    .box { stroke: #304254; stroke-width: 2.4; rx: 24; ry: 24; }
    .before { fill: #eef3ff; }
    .after { fill: #eaf7ef; }
    .event { fill: #fff3db; stroke: #304254; stroke-width: 2.4; rx: 22; ry: 22; }
    .active { fill: #d8eadf; stroke: #4d7a63; stroke-width: 1.8; rx: 14; ry: 14; }
    .dead { fill: #f0e8e6; stroke: #b45d42; stroke-width: 1.8; rx: 14; ry: 14; }
    .fresh { fill: #d8eadf; stroke: #4d7a63; stroke-width: 1.8; rx: 14; ry: 14; }
    .note { fill: #fffdf8; stroke: #c7d0d9; stroke-width: 2; rx: 18; ry: 18; }
    .good { fill: #f5fbf7; stroke: #7fa18e; stroke-width: 2; rx: 18; ry: 18; }
    .warn { fill: #fff3ef; stroke: #cf8168; stroke-width: 2; rx: 18; ry: 18; }
    .title2 { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1c2733; }
    .label { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #304254; }
    .body { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #23313d; }
    .mono { font: 600 15px Consolas, 'Courier New', monospace; fill: #23313d; }
    .strike { text-decoration: line-through; fill: #9a7a72; }
    .edge { stroke: #304254; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
    .cross { stroke: #b45d42; stroke-width: 3; stroke-linecap: round; }
  </style>

  <rect class="bg" x="0" y="0" width="1440" height="960"/>

  <text class="title" x="720" y="48" text-anchor="middle">Control Version Invalidation</text>
  <text class="subtitle" x="720" y="80" text-anchor="middle">Transfer of the controlling NFT or a call to resetDelegations increments controlVersion.</text>
  <text class="subtitle" x="720" y="104" text-anchor="middle">All version-scoped authority is automatically invalidated.</text>

  <!-- ═══════ BEFORE: Version N ═══════ -->
  <rect class="box before" x="40" y="150" width="500" height="430"/>
  <text class="title2" x="290" y="192" text-anchor="middle">Version N — Alice Controls</text>
  <text class="mono" x="290" y="222" text-anchor="middle">ownerOf(tokenId) = Alice</text>

  <rect class="active" x="80" y="260" width="210" height="36"/>
  <text class="body" x="185" y="283" text-anchor="middle">Validator: session key H</text>

  <rect class="active" x="310" y="260" width="210" height="36"/>
  <text class="body" x="415" y="283" text-anchor="middle">Validator: passkey P</text>

  <rect class="active" x="80" y="316" width="210" height="36"/>
  <text class="body" x="185" y="339" text-anchor="middle">Hook: spending limit</text>

  <rect class="active" x="310" y="316" width="210" height="36"/>
  <text class="body" x="415" y="339" text-anchor="middle">Hook: target whitelist</text>

  <rect class="active" x="80" y="376" width="440" height="36"/>
  <text class="mono" x="300" y="399" text-anchor="middle">Signed requests: domain salt includes version N</text>

  <rect class="active" x="80" y="432" width="440" height="36"/>
  <text class="mono" x="300" y="455" text-anchor="middle">ERC-1271 sigs: domain salt includes version N</text>

  <rect class="active" x="80" y="492" width="440" height="36"/>
  <text class="mono" x="300" y="515" text-anchor="middle">Execution nonce: 47</text>

  <!-- ═══════ EVENT: Transfer or Reset ═══════ -->
  <rect class="event" x="620" y="270" width="200" height="140"/>
  <text class="title2" x="720" y="308" text-anchor="middle">Transfer</text>
  <text class="label" x="720" y="335" text-anchor="middle">or</text>
  <text class="title2" x="720" y="365" text-anchor="middle">resetDelegations()</text>
  <text class="mono" x="720" y="392" text-anchor="middle">controlVersion++</text>

  <!-- Arrows: left box → event box → right box (80px each, clearly visible) -->
  <path class="edge" d="M 540 335 L 620 335"/>
  <path class="edge" d="M 820 335 L 900 335"/>

  <!-- ═══════ AFTER: Version N+1 ═══════ -->
  <rect class="box after" x="900" y="150" width="500" height="430"/>
  <text class="title2" x="1150" y="192" text-anchor="middle">Version N+1 — Bob Controls</text>
  <text class="mono" x="1150" y="222" text-anchor="middle">ownerOf(tokenId) = Bob</text>

  <!-- Dead items with crosses -->
  <rect class="dead" x="940" y="260" width="210" height="36"/>
  <text class="body strike" x="1045" y="283" text-anchor="middle">Validator: session key H</text>
  <line class="cross" x1="940" y1="260" x2="1150" y2="296"/>
  <line class="cross" x1="1150" y1="260" x2="940" y2="296"/>

  <rect class="dead" x="1170" y="260" width="210" height="36"/>
  <text class="body strike" x="1275" y="283" text-anchor="middle">Validator: passkey P</text>
  <line class="cross" x1="1170" y1="260" x2="1380" y2="296"/>
  <line class="cross" x1="1380" y1="260" x2="1170" y2="296"/>

  <rect class="dead" x="940" y="316" width="210" height="36"/>
  <text class="body strike" x="1045" y="339" text-anchor="middle">Hook: spending limit</text>
  <line class="cross" x1="940" y1="316" x2="1150" y2="352"/>
  <line class="cross" x1="1150" y1="316" x2="940" y2="352"/>

  <rect class="dead" x="1170" y="316" width="210" height="36"/>
  <text class="body strike" x="1275" y="339" text-anchor="middle">Hook: target whitelist</text>
  <line class="cross" x1="1170" y1="316" x2="1380" y2="352"/>
  <line class="cross" x1="1380" y1="316" x2="1170" y2="352"/>

  <rect class="dead" x="940" y="376" width="440" height="36"/>
  <text class="body strike" x="1160" y="399" text-anchor="middle">Signed requests: wrong domain salt</text>
  <line class="cross" x1="940" y1="376" x2="1380" y2="412"/>
  <line class="cross" x1="1380" y1="376" x2="940" y2="412"/>

  <rect class="dead" x="940" y="432" width="440" height="36"/>
  <text class="body strike" x="1160" y="455" text-anchor="middle">ERC-1271 sigs: wrong domain salt</text>
  <line class="cross" x1="940" y1="432" x2="1380" y2="468"/>
  <line class="cross" x1="1380" y1="432" x2="940" y2="468"/>

  <rect class="fresh" x="940" y="492" width="440" height="36"/>
  <text class="mono" x="1160" y="515" text-anchor="middle">Execution nonce: reset to 0</text>

  <!-- ═══════ BOTTOM PANELS ═══════ -->
  <rect class="good" x="70" y="640" width="420" height="130"/>
  <text class="label" x="280" y="678" text-anchor="middle">Clean Slate for New Controller</text>
  <text class="body" x="280" y="708" text-anchor="middle">Bob starts with zero validators, zero hooks,</text>
  <text class="body" x="280" y="730" text-anchor="middle">nonce at 0. No residual delegated authority</text>
  <text class="body" x="280" y="752" text-anchor="middle">from Alice persists.</text>

  <rect class="warn" x="530" y="640" width="380" height="130"/>
  <text class="label" x="720" y="678" text-anchor="middle">Token Approvals Survive</text>
  <text class="body" x="720" y="708" text-anchor="middle">ERC-20/721/1155 approvals granted by</text>
  <text class="body" x="720" y="730" text-anchor="middle">the account to third parties are stored on</text>
  <text class="body" x="720" y="752" text-anchor="middle">external contracts and are NOT invalidated.</text>

  <rect class="note" x="950" y="640" width="420" height="130"/>
  <text class="label" x="1160" y="678" text-anchor="middle">Two Triggers, Same Effect</text>
  <text class="body" x="1160" y="708" text-anchor="middle">Transfer: changes controller + increments version.</text>
  <text class="body" x="1160" y="730" text-anchor="middle">resetDelegations: same controller,</text>
  <text class="body" x="1160" y="752" text-anchor="middle">but increments version to revoke all delegations.</text>

  <rect class="note" x="70" y="810" width="1300" height="80"/>
  <text class="label" x="720" y="842" text-anchor="middle">The domain salt in EIP-712 includes controlVersion. A version change produces a different digest, structurally invalidating all prior signatures.</text>
  <text class="mono" x="720" y="870" text-anchor="middle">salt = keccak256(abi.encode(controllerToken(), controllerTokenId(), controlVersion()))</text>
</svg>
